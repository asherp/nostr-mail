name: Build

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
            platform: windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x64
            platform: linux
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
            platform: macos
          - os: macos-latest
            target: x86_64-apple-darwin
            arch: x64
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout submodules
        env:
          GLOSSIA_DEPLOY_KEY: ${{ secrets.GLOSSIA_DEPLOY_KEY }}
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "$GLOSSIA_DEPLOY_KEY" > ~/.ssh/glossia_key
          chmod 600 ~/.ssh/glossia_key
          printf "Host github.com\n  IdentityFile ~/.ssh/glossia_key\n  StrictHostKeyChecking no\n" > ~/.ssh/config
          git submodule update --init --recursive
          rm -f ~/.ssh/glossia_key

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri-app/backend
          shared-key: ${{ matrix.platform }}-${{ matrix.arch }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        working-directory: tauri-app/backend
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload Windows NSIS installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: nostr-mail-windows-nsis-${{ matrix.arch }}
          path: tauri-app/backend/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload Windows MSI installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: nostr-mail-windows-msi-${{ matrix.arch }}
          path: tauri-app/backend/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload Linux .deb
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: nostr-mail-linux-deb-${{ matrix.arch }}
          path: tauri-app/backend/target/${{ matrix.target }}/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload Linux .rpm
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: nostr-mail-linux-rpm-${{ matrix.arch }}
          path: tauri-app/backend/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
          if-no-files-found: warn

      - name: Upload Linux AppImage
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: nostr-mail-linux-appimage-${{ matrix.arch }}
          path: tauri-app/backend/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload macOS .dmg
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: nostr-mail-macos-dmg-${{ matrix.arch }}
          path: tauri-app/backend/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
          draft: false
          prerelease: true
